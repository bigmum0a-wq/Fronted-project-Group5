<!DOCTYPE html>

        <div>

    <div class="main-container">
        <aside>
            <div class="second-container">

                        <li><a href="#">Contact us</a></li>

                <div class="active-connected">

            </div>
        </aside>
        <main class="pages" id="pages">
            <div class="third-container">
                <section class="section1">
                    <div class="card1"></div>
                    <div class="card2"></div>
                    <div class="card3"></div>
                    <div class="card4"></div>
                    <div class="card5"></div>
                    <div class="card6"></div>
                    <div class="card7"></div>

                </section>
                <section class="section2">
