<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - School Management</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/settings.css">
</head>
<body>
<section class="settings-container common-management-view">
    <!-- En-tête de la section -->
    <header class="settings-header management-header">
        <h2>Paramètres de l'Application</h2>
        <button id="save-settings-btn" class="btn-save">Enregistrer les modifications</button>
    </header>

    <!-- Contenu principal des paramètres divisé en cartes/sections -->
    <main class="settings-content-grid">
        
        <!-- Section 1 : Informations Générales de l'Établissement -->
        <div class="settings-card">
            <h3>Informations de l'Établissement</h3>
            <form id="school-info-form">
                <div class="form-group">
                    <label for="school-name">Nom de l'école :</label>
                    <input type="text" id="school-name" value="School Management">
                </div>
                <div class="form-group">
                    <label for="academic-year">Année académique en cours :</label>
                    <input type="text" id="academic-year" value="2025-2026">
                </div>
                <div class="form-group">
                    <label for="school-email">Email institutionnel :</label>
                    <input type="email" id="school-email" value="contact@schoolmanagement.edu">
                </div>
            </form>
        </div>

        <!-- Section 2 : Préférences d'Affichage & Système -->
        <div class="settings-card">
            <h3>Préférences Système</h3>
            <form id="system-prefs-form">
                <div class="form-group">
                    <label for="language-select">Langue par défaut :</label>
                    <select id="language-select">
                        <option value="fr" selected>Français</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="theme-select">Thème de l'interface :</label>
                    <select id="theme-select">
                        <option value="light" selected>Clair (Défaut)</option>
                        <option value="dark">Sombre</option>
                    </select>
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="notifications-toggle" checked> Activer les notifications sonores
                    </label>
                </div>
            </form>
        </div>

        <!-- Section 3 : Sécurité et Compte -->
        <div class="settings-card">
            <h3>Sécurité du Compte</h3>
            <form id="security-form">
                <div class="form-group">
                    <label for="current-password">Mot de passe actuel :</label>
                    <input type="password" id="current-password" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label for="new-password">Nouveau mot de passe :</label>
                    <input type="password" id="new-password" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirmer le mot de passe :</label>
                    <input type="password" id="confirm-password" placeholder="••••••••">
                </div>
            </form>
        </div>

        <!-- Section 4 : Gestion des Données / Sauvegarde -->
        <div class="settings-card">
            <h3>Données et Sauvegarde</h3>
            <p class="settings-desc">Exportez ou nettoyez les données locales de l'application selon vos besoins.</p>
            <div class="settings-actions-group">
                <button type="button" id="export-data-btn" class="btn-primary">Exporter les données (JSON)</button>
                <button type="button" id="clear-cache-btn" class="btn-cancel">Vider le cache</button>
            </div>
        </div>

    </main>
</section>

    <script src="../assets/js/settings.js"></script>
</body>
</html>
