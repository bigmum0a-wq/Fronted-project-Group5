
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management - Students</title>
    <link rel="stylesheet" href="../assets/css/students.css">
</head>
<body>
<section class="students-container">
    <!-- En-tête de la section -->
    <header class="students-header">
        <h2>Gestion des Étudiants</h2>
        <button id="open-modal-btn" class="btn-primary">+ Ajouter un étudiant</button>
    </header>

    <!-- Barre de filtres et recherche -->
    <nav class="filter-toolbar" aria-label="Filtres des étudiants">
        <div class="filter-group">
            <label for="cycle-select">Cycle :</label>
            <select id="cycle-select">
                <option value="students_college.json">Collège</option>
                <option value="students_lycee.json" selected>Lycée</option>
                <option value="students_licence.json">Licence</option>
                <option value="students_master.json">Master</option>
                <option value="students_doctorat.json">Doctorat</option>
                <option value="students.json">Tous les cycles (all)</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="class-filter">Classe :</label>
            <select id="class-filter">
                <option value="all">Toutes les classes</option>
            </select>
        </div>
        <div class="search-group">
            <input type="text" id="search-input" placeholder="Rechercher par nom ou ID...">
        </div>
    </nav>

    <!-- Contenu principal (Tableau des étudiants) -->
    <main class="table-responsive">
        <table class="students-table">
            <thead>
                <tr>
                    <th>Photo</th>
                    <th>ID</th>
                    <th>Nom complet</th>
                    <th>Cycle</th>
                    <th>Classe</th>
                    <th>Email</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="students-table-body">
                <tr>
                    <td colspan="7" class="loading-text">Chargement des données...</td>
                </tr>
            </tbody>
        </table>
    </main>
</section>

<!-- Modale d'ajout d'un étudiant -->
<div id="add-student-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <h3>Ajouter un nouvel étudiant</h3>
        <form id="add-student-form">
            <div class="form-group">
                <label for="new-id">ID :</label>
                <input type="text" id="new-id" required placeholder="Ex: LYC051">
            </div>
            <div class="form-group">
                <label for="new-name">Nom complet :</label>
                <input type="text" id="new-name" required placeholder="Prénom et Nom">
            </div>
            <div class="form-group">
                <label for="new-cycle">Cycle :</label>
                <select id="new-cycle" required>
                    <option value="Collège">Collège</option>
                    <option value="Lycée" selected>Lycée</option>
                    <option value="Licence">Licence</option>
                    <option value="Master">Master</option>
                    <option value="Doctorat">Doctorat</option>
                </select>
            </div>
            <div class="form-group">
                <label for="new-class">Classe :</label>
                <input type="text" id="new-class" required placeholder="Ex: Seconde A">
            </div>
            <div class="form-group">
                <label for="new-email">Email :</label>
                <input type="email" id="new-email" placeholder="email@school.com">
            </div>
            <div class="form-group">
                <label for="new-phone">Téléphone :</label>
                <input type="text" id="new-phone" placeholder="+226 ...">
            </div>
            <div class="form-group">
                <label for="new-address">Adresse :</label>
                <input type="text" id="new-address" placeholder="Ville, Secteur">
            </div>
            <div class="modal-actions">
                <button type="submit" class="btn-save">Enregistrer</button>
                <button type="button" id="close-modal-btn" class="btn-cancel">Annuler</button>
            </div>
        </form>
    </div>
</div>
    <script src="../assets/js/students.js"></script>
</body>
</html>
